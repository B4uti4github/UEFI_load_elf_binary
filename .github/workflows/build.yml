name: Build Linux-UEFI Executable Application (.efi)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-uefi:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar Código Fuente y Submódulos
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Instalar Compilador Cruzado para formato PE/COFF (UEFI)
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64-x86-64 build-essential

    - name: Compilar Archivos Objeto (C a .o)
      run: |
        # 1. Agregamos las implementaciones del submódulo crosslibc para string.c
        # 2. -ffreestanding y -fno-builtin desactivan atexit y dependencias de Windows
        x86_64-w64-mingw32-gcc -Wall -Wextra -ffreestanding \
          -fno-stack-protector -mno-red-zone -fPIC -fshort-wchar -fno-builtin \
          -DCLIBC_NO_LL_HEAP \
          -I. -Icrosslibc \
          -c main.c linux-uefi.c clibc-user-impl.c crosslibc/string.c

    - name: Enlazar Binario Final con Formato .efi
      run: |
        # Invertimos el orden: main.o y clibc-user-impl.o van antes de linux-uefi.o
        # Esto permite que el enlazador asocie read, write, open y mmap correctamente.
        # -Wl,--allow-multiple-definition e -lgcc resuelven símbolos huérfanos sin arrastrar atexit
        x86_64-w64-mingw32-gcc -nostdlib -shared \
          -Wl,--subsystem,10 -Wl,-e efi_main \
          -Wl,--allow-multiple-definition \
          main.o clibc-user-impl.o string.o linux-uefi.o \
          -lgcc \
          -o load_elf_binary.efi

    - name: Guardar Artefacto Ejecutable (.efi)
      uses: actions/upload-artifact@v4
      with:
        name: uefi-loader-binary
        path: load_elf_binary.efi
